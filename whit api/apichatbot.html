<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>چت هوشمند</title>
    <link rel="stylesheet" href="apichatbot.css">
</head>
<body>
<div class="chat-box">
    <div class="chat-header">
        <div class="header-content">
            <div class="avatar-circle">
            </div>
            <div class="logo-text">
            </div>
        </div>
    </div>
    <div class="messages-area" id="messagesArea">
        <div class="msg bot">
            Hi im chatbot<br>
            i can help you in:<br>
            • الگوریتم‌های برنامه‌نویسی 💻<br>
            • معادلات و فرمول‌های ریاضی 📐<br>
            • حل مسئله و کدنویسی 🚀<br>
            بهت کمک کنم. بپرس!
            <div class="time">همین الان</div>
        </div>
    </div>

    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="مثلاً: الگوریتم مرتب‌سازی حبابی رو برام بنویس..." autocomplete="off" enterkeyhint="send">
        <button id="sendBtn">📤</button>
    </div>
</div> 
<script src="./apichatbot.js"></script>
</body>
</html>
